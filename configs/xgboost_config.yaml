# XGBoost Baseline Configuration
model:
  name: "XGBoost"
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0
  tree_method: "hist"       # fast histogram method; "gpu_hist" on GPU nodes
  eval_metric: "aucpr"      # optimise PR-AUC
  # scale_pos_weight is computed dynamically as neg_count / pos_count

training:
  early_stopping_rounds: 20
  verbose_eval: 50
  n_jobs: 8

  # SMOTE oversampling on training set only
  smote:
    enabled: true
    sampling_strategy: 0.1  # minority class → 10% of majority after SMOTE
    k_neighbors: 5
    random_state: 42

  # Threshold calibration on validation set
  threshold_calibration:
    enabled: true
    target_recall: 0.80

data:
  paysim_path: "data/raw/paysim.csv"
  ieee_cis_path: "data/raw/ieee_cis_train.csv"
  processed_features_path: "data/processed/features_tabular.parquet"
  train_ratio: 0.80
  val_ratio: 0.10
  test_ratio: 0.10

features:
  numerical: ["amount", "amount_log", "amount_zscore", "velocity_1h",
              "velocity_24h", "account_age_days", "avg_tx_amount",
              "tx_count_30d", "unique_merchants"]
  categorical: ["merchant_category", "hour", "day_of_week", "country_code",
                "tx_type", "channel"]
  target: "is_fraud"

evaluation:
  metrics: ["pr_auc", "roc_auc", "f1", "precision_at_recall_80", "fpr"]

paths:
  model_path: "src/models/baseline/xgboost_model.pkl"
  results_dir: "results/xgboost"
