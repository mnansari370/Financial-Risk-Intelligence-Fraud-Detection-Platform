# XGBoost Baseline Configuration
# Aligned to the corrected tabular features written by src/graph/build_graph.py

model:
  name: "XGBoost"
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0
  tree_method: "hist"
  eval_metric: "aucpr"

training:
  early_stopping_rounds: 20
  verbose_eval: 50
  n_jobs: 8

  smote:
    enabled: true
    sampling_strategy: 0.10
    k_neighbors: 5
    random_state: 42

  threshold_calibration:
    enabled: true
    target_recall: 0.80

data:
  processed_features_path: "data/processed/features_tabular.parquet"
  train_ratio: 0.80
  val_ratio: 0.10
  test_ratio: 0.10

features:
  numerical:
    - amount
    - amount_log
    - amount_zscore
    - hour
    - day_of_week
    - is_night
    - is_round_amount
    - is_first_pair_tx
    - sender_balance_drop
    - receiver_balance_gain
    - is_flagged_fraud
    - velocity_1h_sender
    - velocity_24h_sender
    - velocity_1h_receiver
    - velocity_24h_receiver
  target: "is_fraud"

evaluation:
  metrics:
    - pr_auc
    - roc_auc
    - f1
    - precision_at_recall_80
    - fpr

paths:
  model_path: "src/models/baseline/xgboost_model.pkl"
  results_dir: "results/xgboost"